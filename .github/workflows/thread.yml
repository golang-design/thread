name: thread

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Race Test
      run: |
        go test -v -race -count=1 ./...
    - name: Test
      run: |
        go test -v -coverprofile=coverage.txt -covermode=atomic ./...
